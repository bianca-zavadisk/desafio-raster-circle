<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Rasterizador e Clipping SVG</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Simulador de Rasterização</h2>
        <h3>Ponto médio para Círculos</h3>
        
        <div class="controls">
            <div class="input-section full-width">
                <label>SVG Path:</label>
                <div class="path-input">
                    <input type="text" id="svgPath" value="M 0 0 R 12">
                    <button id="btnRun">Iniciar Rasterização</button>
                </div>
            </div>
            
            <div class="input-section">
                <label>Navegação de Passos:</label>
                <div class="step-controls">
                    <button id="btnPrev">←</button>
                    <span id="stepDisplay">0 / 0</span>
                    <button id="btnNext">→</button>
                </div>
            </div>
            
            <div class="input-section">
                <label>Tamanho do Grid: <span id="gridSizeVal">20</span>px</label>
                <input type="range" id="gridSize" min="5" max="50" value="20">
            </div>
        </div>

        <div class="canvas-container">
            <canvas id="gridCanvas"></canvas>
        </div>

        <div id="debugInfo">
            <div class="stat">Variavel de Decisão (h): <b id="valD">-</b></div>
            <div class="stat">Ponto Ativo (x, y): <b id="valXY">-</b></div>
        </div>
    </div>

    <div class="container poly">
        <h2>Simulador de Clipping</h2>
        <h3>Weiler-Atherton para Polígonos</h3>
        
        <div class="controls">
            <div class="input-section">
                <label>Polígono (Path SVG):</label>
                <input type="text" id="polyPath" value="M -5 -2 L 10 -5 L 20 2 L 10 13 L -2 10 L 1 5 Z">
            </div>
            <div class="input-section">
                <label>Janela de Clipping (M x y L x y... Z):</label>
                <input type="text" id="clipPath" value="M -4 -3 L 18 -3 L 18 10 L -4 10 Z">
            </div>
            
            <div class="input-section full-width">
                <button id="btnRenderPoly">1. Renderizar</button>
                <button id="btnClip">2. Iniciar Clipping</button>
                <div class="step-controls">
                    <button id="btnPrevPoly">←</button>
                    <button id="btnNextPoly">→</button>
                    <span id="polyStepDisplay">Renderize o polígono.</span>
                </div>
            </div>
        </div>

        <div class="canvas-container">
            <canvas id="gridCanvasPoly"></canvas>
        </div>
    </div>
    <script src="script.js"></script>
    <script src="poly.js"></script>
</body>
</html>
